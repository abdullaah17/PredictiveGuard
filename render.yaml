services:
  - type: web
    name: predictiveguard
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    disk:
      name: predictiveguard-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: ConnectionStrings__DefaultConnection
        value: "Data Source=/app/data/PredictiveGuard.db"
      - key: ApiBaseUrl
        value: "http://127.0.0.1:5000"
